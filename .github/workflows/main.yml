name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Add Android platform
        run: npx cordova platform add android

      - name: Remove Cordova Splash Icon
        run: |
          sed -i '/windowSplashScreenAnimatedIcon/d' platforms/android/app/src/main/res/values/themes.xml || true
          sed -i 's/Theme.SplashScreen.IconBackground/Theme.SplashScreen/g' platforms/android/app/src/main/res/values/themes.xml || true

      - name: Build Android APK
        run: npx cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CatfishApp-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
